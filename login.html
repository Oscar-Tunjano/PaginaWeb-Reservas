<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Login</title>
</head>
<body>
<h2>Iniciar sesión</h2>

<form id='loginForm'>
<input id='email' placeholder='Correo' required><br>
<input id='password' type='password' placeholder='Contraseña' required><br>
<button>Ingresar</button>
</form>

<p>Credenciales de prueba: <strong>admin@site.com / 123</strong> | <strong>cliente@site.com / 123</strong></p>

<script>
const users=[
  {email:"admin@site.com",password:"123",role:"admin"},
  {email:"cliente@site.com",password:"123",role:"cliente"}
];

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  let email=document.getElementById('email').value.trim();
  let pass=document.getElementById('password').value;

  let u=users.find(x=>x.email===email&&x.password===pass);

  if(!u){
    alert('Credenciales inválidas');
    return;
  }

  localStorage.setItem('userRole',u.role);
  localStorage.setItem('userEmail',u.email); // persist email to link reservations

  if(u.role==='admin') location='dashboard-admin.html';
  else location='dashboard-cliente.html';
});
</script>

</body>
</html>
